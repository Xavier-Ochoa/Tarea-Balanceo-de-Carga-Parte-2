version: '3.8'

services:

  mysql_master:
    container_name: Maestro
    image: mysql:8.0
    ports:
      - "3306:3306"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-do-db=cine
      --log-slave-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cine
    volumes:
      - master_datos:/var/lib/mysql

  mysql_slave:
    container_name: Esclavo
    image: mysql:8.0
    ports:
      - "3307:3306"
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-do-db=cine
      --relay-log=mysql-relay-bin
      --log-slave-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: root
        
    volumes:
      - slave_datos:/var/lib/mysql
    depends_on:
      - mysql_master

  nodo1:
    container_name: nodo1
    build: .
    environment:
      DB_HOST: mysql_master
      NODO_NAME: "Nodo 1"
    depends_on:
      - mysql_master

  nodo2:
    container_name: nodo2
    build: .
    environment:
      DB_HOST: mysql_slave
      NODO_NAME: "Nodo 2"
    depends_on:
      - mysql_slave

  nginx:
    container_name: nginx_balancer
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nodo1
      - nodo2

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOSTS: "mysql_master,mysql_slave"
      PMA_ARBITRARY: 1
    depends_on:
      - mysql_master
      - mysql_slave

volumes:
  master_datos:
  slave_datos: